<!DOCTYPE html>
<html>
<head>
  <title>User Form</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      animation: fadeIn 1s ease-in-out;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: #007BFF;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      color: green;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Add User</h2>
    <form id="userForm">
      <input type="text" id="name" placeholder="Enter name" required>
      <input type="text" id="phone" placeholder="Enter phone" required>
      <button type="submit">Submit</button>
    </form>
    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById("userForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;

      try {
        const response = await fetch("http://localhost:8000/adduser", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name, phone: phone })
        });

        const data = await response.json();
        if (data.id) {
          document.getElementById("result").innerText = "✅ User saved successfully with ID: " + data.id;
          // clear form fields
          document.getElementById("userForm").reset();
        } else {
          document.getElementById("result").innerText = "❌ Error: " + JSON.stringify(data);
        }
      } catch (error) {
        document.getElementById("result").innerText = "❌ Request failed: " + error;
      }
    });
  </script>
</body>
</html>

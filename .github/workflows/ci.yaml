---
name: CI

on:
  push:
    branches: [main]

jobs:
  docker-file-lint-and-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: 
        folders: [backend, frontend, nginx-reverseproxy]

    steps:
            - name: Code Checkout
              uses: actions/checkout@v7    
    
            - name: ${{ matrix.folders }} Dockerfile Lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ./${{ matrix.folders}}/Dockerfile

            - name: Docker Build ${{ matrix.folders }}
              run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/project-${{ matrix.folders }}:latest --no-cache
              working-directory: ./${{ matrix.folders }} 
              
            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              continue-on-error: true
              with:
                image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/project-${{ matrix.folders }}:latest
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL'  

  build-and-push:
    needs: [docker-file-lint-and-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_folder: [backend, frontend, nginx-reverseproxy]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7


      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.env_folder }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/project-${{ matrix.env_folder }}:latest

  deploy:
        needs: build-and-push
        uses: ./.github/workflows/cd.yaml
        secrets: inherit        
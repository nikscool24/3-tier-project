---
services:
  
  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME}
    image: ${POSTGRES_IMAGE}
    restart: always
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - project-network  
  redis:
    container_name: ${REDIS_CONTAINER_NAME}
    image: ${REDIS_IMAGE}
    restart: always
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}"
    networks:
      - project-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5  

  backend:
    container_name: ${BACKEND_CONTAINER_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    image: ${BACKEND_IMAGE}
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}"
    networks:
      - project-network  
    environment:
      PORT: "${BACKEND_CONTAINER_PORT}"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_CONTAINER_NAME}:${POSTGRES_CONTAINER_PORT}/${POSTGRES_DB}"
      REDIS_URL: "redis://${REDIS_CONTAINER_NAME}:6379"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_CONTAINER_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5  

  frontend:
    container_name: ${FRONTEND_CONTAINER_NAME}
    depends_on:
      backend:
        condition: service_started
    image: ${FRONTEND_IMAGE}
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}" 
    networks:
      - project-network

  reverseproxy:
    container_name: ${NGINX_CONTAINER_NAME}
    depends_on:
      - backend
      - frontend
    image: ${NGINX_IMAGE}
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_CONTAINER_PORT}"
    restart: always
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${NGINX_CONTAINER_PORT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  
         

volumes:
  postgres-data:

networks:
  project-network:
    driver: bridge
